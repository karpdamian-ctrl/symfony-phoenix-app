name: Symfony CI

on:
  push:
  pull_request:

jobs:
  symfony-test:
    name: Symfony test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: symfony_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d symfony_app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: symfony-app

    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app
      PHOENIX_BASE_URL: http://127.0.0.1:4000
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  symfony-phoenix-integration:
    name: Symfony Phoenix integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: symfony_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d symfony_app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app
      PHOENIX_BASE_URL: http://127.0.0.1:4000
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app_test
      SECRET_KEY_BASE: thisisasecret111
      PHX_HOST: 127.0.0.1
      PORT: 4000
      MIX_ENV: dev
      DATABASE_URL_PHOENIX: ecto://postgres:postgres@127.0.0.1:5432/phoenix_api

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql
          tools: composer
          coverage: none

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16.3'
          otp-version: '26.2'

      - name: Install Symfony dependencies
        working-directory: symfony-app
        run: composer install --no-interaction --prefer-dist

      - name: Install Phoenix dependencies
        working-directory: phoenix-api
        run: mix deps.get

      - name: Create Phoenix database
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE phoenix_api;"

      - name: Prepare Phoenix database
        working-directory: phoenix-api
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_PHOENIX }}
        run: |
          mix ecto.migrate
          mix run priv/repo/seeds.exs

      - name: Start Phoenix server
        working-directory: phoenix-api
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_PHOENIX }}
        run: nohup mix phx.server > /tmp/phoenix.log 2>&1 &

      - name: Wait for Phoenix server
        run: |
          for i in {1..30}; do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/api/photos || true)
            if [ "$status_code" = "200" ] || [ "$status_code" = "401" ]; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/phoenix.log
          exit 1

      - name: Prepare Symfony test database
        working-directory: symfony-app
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run Symfony integration tests
        working-directory: symfony-app
        env:
          PHOENIX_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/phoenix_api
        run: composer test-integration

  symfony-coverage:
    name: Symfony coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: symfony_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d symfony_app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: symfony-app

    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app
      PHOENIX_BASE_URL: http://127.0.0.1:4000
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql
          tools: composer
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run PHPUnit with coverage
        run: php -d pcov.enabled=1 vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: karpdamian-ctrl/symfony-phoenix-app
          files: ./symfony-app/coverage.xml
          flags: symfony
          disable_search: true

  symfony-phpstan:
    name: Symfony PHPStan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: symfony-app

    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app
      PHOENIX_BASE_URL: http://127.0.0.1:4000
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer phpstan

  symfony-php-cs-fixer:
    name: Symfony PHP CS Fixer
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: symfony-app

    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app
      PHOENIX_BASE_URL: http://127.0.0.1:4000
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP CS Fixer
        run: composer php-cs-fixer
