name: Phoenix CI

on:
  push:
  pull_request:

jobs:
  phoenix-format:
    name: Phoenix format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phoenix-api

    env:
      DB_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.7'
          otp-version: '26.2'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            phoenix-api/deps
            phoenix-api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('phoenix-api/mix.lock') }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  phoenix-credo:
    name: Phoenix Credo
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phoenix-api

    env:
      DB_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.7'
          otp-version: '26.2'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            phoenix-api/deps
            phoenix-api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('phoenix-api/mix.lock') }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run Credo
        run: mix credo

  phoenix-test:
    name: Phoenix test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: phoenix_api_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d phoenix_api_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: phoenix-api

    env:
      MIX_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 5433

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.7'
          otp-version: '26.2'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            phoenix-api/deps
            phoenix-api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('phoenix-api/mix.lock') }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run tests
        run: mix test

  phoenix-coverage:
    name: Phoenix coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: phoenix_api_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d phoenix_api_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: phoenix-api

    env:
      MIX_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 5433

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.7'
          otp-version: '26.2'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            phoenix-api/deps
            phoenix-api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('phoenix-api/mix.lock') }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run coverage
        run: mix coveralls.json

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: karpdamian-ctrl/symfony-phoenix-app
          files: ./phoenix-api/cover/excoveralls.json
          flags: phoenix
          disable_search: true

  phoenix-dialyzer:
    name: Phoenix Dialyzer
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phoenix-api

    env:
      MIX_ENV: dev
      DB_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.7'
          otp-version: '26.2'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            phoenix-api/deps
            phoenix-api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('phoenix-api/mix.lock') }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run Dialyzer
        run: mix dialyzer
