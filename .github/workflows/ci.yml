name: CI

on:
  push:
  pull_request:

jobs:
  symfony-test:
    name: Symfony test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: symfony_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d symfony_app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: symfony-app

    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run PHPUnit
        run: composer test

  symfony-phpstan:
    name: Symfony PHPStan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: symfony-app

    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer phpstan

  symfony-php-cs-fixer:
    name: Symfony PHP CS Fixer
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: symfony-app

    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/symfony_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP CS Fixer
        run: composer php-cs-fixer

  phoenix-format:
    name: Phoenix format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phoenix-api

    env:
      DB_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.7'
          otp-version: '26.2'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            phoenix-api/deps
            phoenix-api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('phoenix-api/mix.lock') }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  phoenix-credo:
    name: Phoenix Credo
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phoenix-api

    env:
      DB_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.7'
          otp-version: '26.2'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            phoenix-api/deps
            phoenix-api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('phoenix-api/mix.lock') }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run Credo
        run: mix credo

  phoenix-test:
    name: Phoenix test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: phoenix_api_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d phoenix_api_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: phoenix-api

    env:
      MIX_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 5433

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.7'
          otp-version: '26.2'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            phoenix-api/deps
            phoenix-api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('phoenix-api/mix.lock') }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run tests
        run: mix test

  phoenix-dialyzer:
    name: Phoenix Dialyzer
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phoenix-api

    env:
      MIX_ENV: dev
      DB_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.7'
          otp-version: '26.2'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            phoenix-api/deps
            phoenix-api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('phoenix-api/mix.lock') }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run Dialyzer
        run: mix dialyzer
